version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fiatdex_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=fiatdex
    ports:
      - "5434:5432"

  redis:
    image: redis:7-alpine
    container_name: fiatdex_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: fiatdex_api
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: fiatdex_celery
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info

volumes:
  postgres_data:
